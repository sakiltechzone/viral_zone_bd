<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Viral Zone BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { text-align: center; color: #ff4757; }
        label { font-weight: 600; display: block; margin-top: 15px; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 12px; background: #ff4757; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff6b81; }
        .success-msg { color: #2ed573; text-align: center; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>অ্যাডমিন প্যানেল কনট্রোল</h2>

    <div class="card">
        <h3 style="margin-top:0; color:#3742fa;">১. গ্লোবাল অ্যাড সেটিংস</h3>
        
        <label>Adsgram Block ID:</label>
        <input type="text" id="adsgramId" placeholder="যেমন: 24186">

        <label>ভিডিও আনলক করতে কয়টি অ্যাড দেখতে হবে?</label>
        <input type="number" id="requiredAds" placeholder="যেমন: 3" value="3">

        <button onclick="saveSettings()">সেটিংস সেভ করুন</button>
        <div id="settingsMsg" class="success-msg">সেটিংস আপডেট হয়েছে!</div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; color:#2ed573;">২. নতুন ভিডিও যুক্ত করুন (আনলিমিটেড)</h3>
        
        <label>ভিডিওর টাইটেল:</label>
        <input type="text" id="vTitle" placeholder="আকর্ষণীয় একটি টাইটেল দিন">

        <label>থাম্বনেইল ছবির লিংক:</label>
        <input type="text" id="vThumb" placeholder="ছবির ডাইরেক্ট লিংক দিন">

        <label>আসল ভিডিওর লিংক (Embed URL):</label>
        <input type="text" id="vLink" placeholder="যেমন: https://byse.sx/e/abcd...">

        <button onclick="addVideo()" style="background: #2ed573;">ভিডিও পাবলিশ করুন</button>
        <div id="videoMsg" class="success-msg">নতুন ভিডিও সফলভাবে যুক্ত হয়েছে!</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAl0eRqOs5QNUg_J1Pj-4PlEqRDxAXr-oA",
        authDomain: "viral-zone-bd.firebaseapp.com",
        projectId: "viral-zone-bd",
        storageBucket: "viral-zone-bd.firebasestorage.app",
        messagingSenderId: "794737483555",
        appId: "1:794737483555:web:a275cd96aafff0e640f696",
        databaseURL: "https://viral-zone-bd-default-rtdb.firebaseio.com"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // পেজ লোড হলে আগের সেটিংস দেখাবে
    db.ref('siteConfig').once('value', snap => {
        if(snap.val()) {
            document.getElementById('adsgramId').value = snap.val().adsgramId || "";
            document.getElementById('requiredAds').value = snap.val().requiredAds || 3;
        }
    });

    // সেটিংস সেভ করার ফাংশন
    function saveSettings() {
        const id = document.getElementById('adsgramId').value;
        const adsCount = document.getElementById('requiredAds').value;

        db.ref('siteConfig').update({
            adsgramId: id,
            requiredAds: parseInt(adsCount)
        }).then(() => {
            const msg = document.getElementById('settingsMsg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        });
    }

    // আনলিমিটেড ভিডিও যুক্ত করার ফাংশন
    function addVideo() {
        const title = document.getElementById('vTitle').value;
        const thumb = document.getElementById('vThumb').value;
        const link = document.getElementById('vLink').value;

        if(!title || !thumb || !link) {
            alert("অনুগ্রহ করে সবগুলো ঘর পূরণ করুন!");
            return;
        }

        // নতুন ভিডিও ডাটাবেসে পুশ (Push) করা হচ্ছে
        db.ref('bot_videos').push({
            title: title,
            thumb: thumb,
            link: link,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            document.getElementById('vTitle').value = "";
            document.getElementById('vThumb').value = "";
            document.getElementById('vLink').value = "";
            
            const msg = document.getElementById('videoMsg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        });
    }
</script>

</body>
</html>
