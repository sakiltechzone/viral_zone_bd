<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল | Premium & Viral Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Hind Siliguri', 'Poppins', sans-serif; background: #eef2f5; padding: 20px; margin: 0; color: #333; }
        .container { max-width: 850px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #2c3e50; font-size: 28px; margin: 0; }
        .header p { color: #7f8c8d; margin-top: 5px; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 4px solid; }
        .card-settings { border-top-color: #3742fa; } 
        .card-movie { border-top-color: #fbc531; }
        .card-viral { border-top-color: #ff4757; }
        
        h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        
        label { font-weight: 600; font-size: 14px; color: #555; display: block; margin-top: 15px; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-family: inherit; transition: 0.3s; font-size: 14px;}
        input:focus { outline: none; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        .input-movie:focus { border-color: #fbc531; }
        .input-viral:focus { border-color: #ff4757; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: 600; font-family: inherit; transition: 0.3s; flex: 1; font-size: 15px; }
        
        .btn-settings { background: #3742fa; } .btn-settings:hover { background: #2f3640; }
        .btn-movie { background: #e1b12c; color: #2d3436; } .btn-movie:hover { background: #fbc531; }
        .btn-viral { background: #ff4757; } .btn-viral:hover { background: #ff3344; }
        .btn-cancel { background: #95a5a6; display: none; } .btn-cancel:hover { background: #7f8c8d; }
        
        .video-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 15px 0; gap: 10px; }
        .video-item:last-child { border-bottom: none; }
        .video-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .video-info img { width: 70px; height: 45px; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-shrink: 0; }
        .video-details { flex: 1; min-width: 0; }
        .video-details h4 { margin: 0 0 5px 0; font-size: 14px; color: #2f3640; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-details p { margin: 0; font-size: 12px; color: #7f8c8d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .action-btns { display: flex; gap: 8px; flex-shrink: 0; }
        .action-btns button { padding: 8px 12px; font-size: 13px; flex: none; border-radius: 6px; color: white; }
        .btn-edit { background: #ffa502; } .btn-edit:hover { background: #e59400; }
        .btn-delete { background: #e74c3c; } .btn-delete:hover { background: #c0392b; }

        .video-count { padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: normal; color: white; }
        .count-movie { background: #e1b12c; color: #333; font-weight: bold; }
        .count-viral { background: #ff4757; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Admin Panel <i class="fas fa-tools"></i></h1>
        <p>Premium Movie Zone & Viral Zone BD</p>
    </div>

    <div class="card card-settings">
        <h3><i class="fas fa-cog" style="color: #3742fa;"></i> গ্লোবাল অ্যাড সেটিংস</h3>
        
        <label>Adsgram Block ID:</label>
        <input type="text" id="setAdsgramId" placeholder="আপনার Adsgram ID দিন...">
        
        <label>ভিডিও আনলক করতে ইউজারকে কয়টি অ্যাড দেখতে হবে?</label>
        <input type="number" id="setRequiredAds" placeholder="যেমন: 3" value="3">
        
        <div class="btn-group">
            <button class="btn-settings" onclick="saveAdSettings()"><i class="fas fa-save"></i> অ্যাড সেটিংস সেভ করুন</button>
        </div>
    </div>

    <div class="card card-movie">
        <h3 id="formTitleMovie"><span style="color:#e1b12c;"><i class="fas fa-film"></i> মুভি আপলোড (Movie Zone)</span></h3>
        <input type="hidden" id="editKeyMovie">
        
        <label>মুভির টাইটেল</label>
        <input type="text" class="input-movie" id="mTitle" placeholder="যেমন: Aquaman 2 (2023) Hindi Dubbed">
        
        <label>থাম্বনেইল লিংক (ছবির লিংক)</label>
        <input type="text" class="input-movie" id="mThumb" placeholder="ছবির লিংক দিন">
        
        <label>Mega Cloud / ভিডিও লিংক</label>
        <input type="text" class="input-movie" id="mLink" placeholder="যেমন: https://mega.nz/file/...">

        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>ডিউরেশন</label>
                <input type="text" class="input-movie" id="mDuration" placeholder="যেমন: 2:04:00">
            </div>
            <div style="flex:1;">
                <label>ভিউ</label>
                <input type="text" class="input-movie" id="mViews" placeholder="যেমন: 15K">
            </div>
            <div style="flex:1;">
                <label>আপলোড সময়</label>
                <input type="text" class="input-movie" id="mTime" placeholder="যেমন: 1 day ago">
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-movie" id="btnSaveMovie" onclick="saveData('movie')"><i class="fas fa-upload"></i> মুভি পাবলিশ করুন</button>
            <button class="btn-cancel" id="btnCancelMovie" onclick="cancelEdit('movie')"><i class="fas fa-times"></i> বাতিল করুন</button>
        </div>

        <h3 style="margin-top: 30px; font-size: 16px;">🎬 মুভি লিস্ট <span class="video-count count-movie" id="movieCounter">0 টি</span></h3>
        <div id="movieList"><p style="text-align:center; color:#7f8c8d;">লোড হচ্ছে...</p></div>
    </div>


    <div class="card card-viral">
        <h3 id="formTitleViral"><span style="color:#ff4757;"><i class="fas fa-fire-alt"></i> ভাইরাল ভিডিও আপলোড (Viral Zone)</span></h3>
        <input type="hidden" id="editKeyViral">
        
        <label>ভাইরাল ভিডিওর টাইটেল</label>
        <input type="text" class="input-viral" id="vTitle" placeholder="যেমন: ভাইরাল স্ক্যান্ডাল ভিডিও পার্ট ১ 🔞">
        
        <label>থাম্বনেইল লিংক (ছবির লিংক)</label>
        <input type="text" class="input-viral" id="vThumb" placeholder="ছবির লিংক দিন">

        <label>GIF লিংক (হোভার/প্লে করলে যা দেখাবে - অপশনাল)</label>
        <input type="text" class="input-viral" id="vGif" placeholder="GIF লিংক (যদি থাকে)">
        
        <label>আসল ভিডিওর লিংক</label>
        <input type="text" class="input-viral" id="vLink" placeholder="যেমন: https://byse.sx/e/...">
        
        <div class="btn-group">
            <button class="btn-viral" id="btnSaveViral" onclick="saveData('viral')"><i class="fas fa-upload"></i> ভাইরাল ভিডিও পাবলিশ করুন</button>
            <button class="btn-cancel" id="btnCancelViral" onclick="cancelEdit('viral')"><i class="fas fa-times"></i> বাতিল করুন</button>
        </div>

        <h3 style="margin-top: 30px; font-size: 16px;">🔥 ভাইরাল ভিডিও লিস্ট <span class="video-count count-viral" id="viralCounter">0 টি</span></h3>
        <div id="viralList"><p style="text-align:center; color:#7f8c8d;">লোড হচ্ছে...</p></div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAl0eRqOs5QNUg_J1Pj-4PlEqRDxAXr-oA",
        authDomain: "viral-zone-bd.firebaseapp.com",
        projectId: "viral-zone-bd",
        storageBucket: "viral-zone-bd.firebasestorage.app",
        messagingSenderId: "794737483555",
        appId: "1:794737483555:web:a275cd96aafff0e640f696",
        databaseURL: "https://viral-zone-bd-default-rtdb.firebaseio.com"
    };

    let db;
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    
    loadSettings(); 
    loadList('movie', 'movie_videos'); // মুভি নোড
    loadList('viral', 'bot_videos');   // ভাইরাল 노ড

    // --- Global Settings ---
    function saveAdSettings() {
        const adsgramId = document.getElementById('setAdsgramId').value;
        const requiredAds = document.getElementById('setRequiredAds').value;

        db.ref('siteConfig').update({
            adsgramId: adsgramId,
            requiredAds: parseInt(requiredAds) || 3
        }).then(() => alert("✅ গ্লোবাল অ্যাড সেটিংস আপডেট হয়েছে!"));
    }

    function loadSettings() {
        db.ref('siteConfig').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('setAdsgramId').value = data.adsgramId || "";
                document.getElementById('setRequiredAds').value = data.requiredAds || 3;
            }
        });
    }

    // --- Save Data (Movie & Viral) ---
    function saveData(type) {
        let key, data, dbNode;

        if (type === 'movie') {
            key = document.getElementById('editKeyMovie').value;
            dbNode = 'movie_videos';
            data = {
                title: document.getElementById('mTitle').value,
                thumbnail: document.getElementById('mThumb').value,
                megaLink: document.getElementById('mLink').value,
                duration: document.getElementById('mDuration').value || "0:00",
                views: document.getElementById('mViews').value || "0",
                time: document.getElementById('mTime').value || "New",
                timestamp: Date.now()
            };
            if(!data.title || !data.thumbnail || !data.megaLink) return alert("মুভির টাইটেল, থাম্বনেইল এবং লিংক অবশ্যই দিন!");
        } 
        else if (type === 'viral') {
            key = document.getElementById('editKeyViral').value;
            dbNode = 'bot_videos';
            data = {
                title: document.getElementById('vTitle').value,
                thumb: document.getElementById('vThumb').value,
                gif: document.getElementById('vGif').value || "",
                link: document.getElementById('vLink').value,
                timestamp: Date.now()
            };
            if(!data.title || !data.thumb || !data.link) return alert("ভিডিওর টাইটেল, থাম্বনেইল এবং লিংক অবশ্যই দিন!");
        }

        if(key) {
            db.ref(dbNode).child(key).update(data).then(() => {
                alert(`✅ ${type === 'movie' ? 'মুভি' : 'ভিডিও'} আপডেট হয়েছে!`);
                cancelEdit(type);
            });
        } else {
            db.ref(dbNode).push(data).then(() => {
                alert(`✅ নতুন ${type === 'movie' ? 'মুভি' : 'ভিডিও'} পাবলিশ হয়েছে!`);
                cancelEdit(type);
            });
        }
    }

    // --- Load List ---
    function loadList(type, dbNode) {
        db.ref(dbNode).orderByChild('timestamp').on('value', (snap) => {
            const list = document.getElementById(`${type}List`);
            let html = "";
            let count = 0;
            let itemsArray = [];

            snap.forEach(child => {
                itemsArray.push({ key: child.key, ...child.val() });
                count++;
            });
            
            itemsArray.reverse();
            document.getElementById(`${type}Counter`).innerText = count + " টি আপলোড হয়েছে";

            if(count === 0) {
                list.innerHTML = `<p style='text-align:center; color:#7f8c8d; padding:20px;'>কোনো ${type === 'movie' ? 'মুভি' : 'ভিডিও'} নেই।</p>`;
                return;
            }

            itemsArray.forEach(item => {
                const cleanData = JSON.stringify(item).replace(/"/g, '&quot;');
                const thumbImg = item.thumb || item.thumbnail;
                const linkTxt = item.link || item.megaLink;

                html += `
                <div class="video-item">
                    <div class="video-info">
                        <img src="${thumbImg}" onerror="this.src='https://via.placeholder.com/80x50?text=No+Image'">
                        <div class="video-details">
                            <h4>${item.title}</h4>
                            <p title="${linkTxt}">${linkTxt}</p>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-edit" onclick="editData('${type}', '${cleanData}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteData('${dbNode}', '${item.key}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            });
            
            list.innerHTML = html;
        });
    }

    // --- Edit & Cancel ---
    function editData(type, jsonString) {
        const data = JSON.parse(jsonString);
        
        if (type === 'movie') {
            document.getElementById('editKeyMovie').value = data.key;
            document.getElementById('mTitle').value = data.title;
            document.getElementById('mThumb').value = data.thumbnail || data.thumb;
            document.getElementById('mLink').value = data.megaLink || data.link;
            document.getElementById('mDuration').value = data.duration || '';
            document.getElementById('mViews').value = data.views || '';
            document.getElementById('mTime').value = data.time || '';
            
            document.getElementById('formTitleMovie').innerHTML = '<span style="color:#e1b12c;"><i class="fas fa-edit"></i> মুভি এডিট করুন</span>';
            document.getElementById('btnSaveMovie').innerHTML = '<i class="fas fa-sync"></i> আপডেট করুন';
            document.getElementById('btnCancelMovie').style.display = "block";
            document.getElementById('formTitleMovie').scrollIntoView({ behavior: 'smooth' });
        } 
        else if (type === 'viral') {
            document.getElementById('editKeyViral').value = data.key;
            document.getElementById('vTitle').value = data.title;
            document.getElementById('vThumb').value = data.thumb || data.thumbnail;
            document.getElementById('vGif').value = data.gif || '';
            document.getElementById('vLink').value = data.link || data.megaLink;
            
            document.getElementById('formTitleViral').innerHTML = '<span style="color:#ff4757;"><i class="fas fa-edit"></i> ভাইরাল এডিট করুন</span>';
            document.getElementById('btnSaveViral').innerHTML = '<i class="fas fa-sync"></i> আপডেট করুন';
            document.getElementById('btnCancelViral').style.display = "block";
            document.getElementById('formTitleViral').scrollIntoView({ behavior: 'smooth' });
        }
    }

    function cancelEdit(type) {
        if (type === 'movie') {
            document.getElementById('editKeyMovie').value = "";
            document.getElementById('mTitle').value = "";
            document.getElementById('mThumb').value = "";
            document.getElementById('mLink').value = "";
            document.getElementById('mDuration').value = "";
            document.getElementById('mViews').value = "";
            document.getElementById('mTime').value = "";
            
            document.getElementById('formTitleMovie').innerHTML = '<span style="color:#e1b12c;"><i class="fas fa-film"></i> মুভি আপলোড (Movie Zone)</span>';
            document.getElementById('btnSaveMovie').innerHTML = '<i class="fas fa-upload"></i> মুভি পাবলিশ করুন';
            document.getElementById('btnCancelMovie').style.display = "none";
        } 
        else if (type === 'viral') {
            document.getElementById('editKeyViral').value = "";
            document.getElementById('vTitle').value = "";
            document.getElementById('vThumb').value = "";
            document.getElementById('vGif').value = "";
            document.getElementById('vLink').value = "";
            
            document.getElementById('formTitleViral').innerHTML = '<span style="color:#ff4757;"><i class="fas fa-fire-alt"></i> ভাইরাল ভিডিও আপলোড (Viral Zone)</span>';
            document.getElementById('btnSaveViral').innerHTML = '<i class="fas fa-upload"></i> ভাইরাল ভিডিও পাবলিশ করুন';
            document.getElementById('btnCancelViral').style.display = "none";
        }
    }

    // --- Delete Data ---
    function deleteData(dbNode, key) {
        if(confirm("আপনি কি নিশ্চিত যে এই আইটেমটি ডিলিট করতে চান?")) {
            db.ref(dbNode).child(key).remove();
        }
    }
</script>
</body>
</html>
